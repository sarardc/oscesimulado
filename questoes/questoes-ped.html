<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões pediatria</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #1abc9c;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        #sidebar {
            width: 250px;
            background: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        #sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .btn-bloco {
            padding: 15px;
            margin-bottom: 10px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .btn-bloco:hover, .btn-bloco.active {
            background: var(--accent-color);
        }

        /* Main Content Styles */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        #titulo-bloco {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .question-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-color);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background: #e9ecef;
            border-color: #adb5bd;
        }

        .option-btn.selected {
            background: #ebf5fb;
            border-color: #3498db;
        }

        .option-btn.correct {
            background: var(--correct-color) !important;
            color: white;
            border-color: var(--correct-color);
        }

        .option-btn.wrong {
            background: var(--wrong-color) !important;
            color: white;
            border-color: var(--wrong-color);
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 10px 20px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .action-btn:hover:not(:disabled) {
            background: var(--primary-color);
        }

        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .feedback-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #ebf5fb;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            line-height: 1.6;
        }

        .feedback-box h4 {
            margin-top: 0;
            color: #2980b9;
        }

        .hint-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fcf3cf;
            border-left: 5px solid #f1c40f;
            border-radius: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

        // UI Logic
        const quizArea = document.getElementById('quiz-area');
        const tituloBloco = document.getElementById('titulo-bloco');
        const buttons = document.querySelectorAll('.btn-bloco');

        function loadBloco(blocoId) {
            // Update active button
            buttons.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`button[onclick="loadBloco('${blocoId}')"]`).classList.add('active');

            // Format Title
            let tituloStr = blocoId.replace('bloco', 'Bloco ');
            tituloBloco.innerText = tituloStr + " - Simulado Ativo";
            quizArea.innerHTML = '';

            const questions = quizData[blocoId];
            
            if(!questions) {
                quizArea.innerHTML = "<p><em>Este bloco ainda não foi carregado. Envie 'continue' no chat para obter os dados.</em></p>";
                return;
            }

            // Render Questions
            questions.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-card';
                
                // Question Text
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `Questão ${index + 1}: ${q.question}`;
                qDiv.appendChild(qText);

                // Options Container
                const optsContainer = document.createElement('div');
                optsContainer.className = 'options-container';

                q.options.forEach((opt, optIndex) => {
                    const optBtn = document.createElement('button');
                    optBtn.className = 'option-btn';
                    optBtn.innerText = String.fromCharCode(65 + optIndex) + ") " + opt.text;
                    optBtn.onclick = () => selectOption(optBtn, optsContainer, opt.isCorrect, qDiv);
                    optsContainer.appendChild(optBtn);
                });

                qDiv.appendChild(optsContainer);

                // Hint Button
                const hintBtn = document.createElement('button');
                hintBtn.className = 'action-btn';
                hintBtn.style.marginTop = '15px';
                hintBtn.innerText = 'Dica';
                hintBtn.onclick = () => toggleHint(qDiv);
                
                const hintBox = document.createElement('div');
                hintBox.className = 'hint-box';
                hintBox.innerText = "Dica: " + q.hint;

                qDiv.appendChild(hintBtn);
                qDiv.appendChild(hintBox);

                // Feedback/Rationale Box
                const feedbackBox = document.createElement('div');
                feedbackBox.className = 'feedback-box';
                feedbackBox.innerHTML = `<h4>Revisão Geral e Resposta:</h4><p>${q.rationale}</p>`;
                qDiv.appendChild(feedbackBox);

                quizArea.appendChild(qDiv);
            });
        }

        function selectOption(selectedBtn, container, isCorrect, qDiv) {
            // Disable all buttons in this container
            const allBtns = container.querySelectorAll('.option-btn');
            allBtns.forEach(btn => {
                btn.disabled = true;
                btn.style.cursor = 'not-allowed';
            });

            // Mark colors
            if(isCorrect) {
                selectedBtn.classList.add('correct');
            } else {
                selectedBtn.classList.add('wrong');
                // find correct and mark it
                allBtns.forEach(btn => {
                    if(btn.onclick.toString().includes('true')) {
                        btn.style.border = '2px solid var(--correct-color)';
                        btn.style.fontWeight = 'bold';
                    }
                });
            }

            // Show Rationale
            const feedbackBox = qDiv.querySelector('.feedback-box');
            feedbackBox.style.display = 'block';
        }

        function toggleHint(qDiv) {
            const hintBox = qDiv.querySelector('.hint-box');
            hintBox.style.display = hintBox.style.display === 'block' ? 'none' : 'block';
        }

        // Initialize First Block
        window.onload = () => loadBloco('bloco01');

    </script>
