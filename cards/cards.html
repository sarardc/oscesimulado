<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{padding:1rem 0}
.top-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.top-bar input{flex:1;min-width:160px;padding:7px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px}
.count{font-size:13px;color:var(--color-text-secondary);padding:7px 0;white-space:nowrap}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.fb{padding:4px 13px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:12px;cursor:pointer}
.fb.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.85rem 1rem;cursor:pointer}
.card:hover{border-color:var(--color-border-secondary)}
.card.open{border-color:var(--color-border-info)}
.ch{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.badge{font-size:13px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.ctitle{font-size:18px;font-weight:500;color:var(--color-text-primary);flex:1}
.csub{font-size:16px;color:var(--color-text-secondary);margin-bottom:0}
.ico{color:var(--color-text-tertiary);font-size:16px;transition:transform .2s;flex-shrink:0;margin-top:2px}
.card.open .ico{transform:rotate(180deg)}
.body{display:none;border-top:0.5px solid var(--color-border-tertiary);padding-top:9px;margin-top:8px}
.card.open .body{display:block}
.sl{font-size:15px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin:7px 0 4px}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.pill{font-size:15px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary)}
.qa{display:flex;flex-direction:column;gap:4px}
.qi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:6px 9px}
.qq{font: size 17px;px;color:var(--color-text-secondary);margin-bottom:1px}
.qa-a{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.alert{background:var(--color-background-danger);border-radius:var(--border-radius-md);padding:6px 9px;margin-top:8px;font-size:12px;color:var(--color-text-danger)}
.askb{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer}
.askb:hover{background:var(--color-background-secondary)}
.empty{text-align:center;color:var(--color-text-tertiary);padding:2rem;font-size:16px}
</style>

<div class="wrap">
<h2>Flashcards OSCE — Saúde Mental, Pediatria e Endocrinologia</h2>
<div class="top-bar">
  <input type="text" id="search" placeholder="Buscar qualquer tema..." oninput="render()">
  <span class="count" id="count"></span>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="cards"></div>
</div>

const data=[
  {id:'tab',cat:'humor',title:'Transtorno Afetivo Bipolar (TAB)',sub:'Alternância mania/hipomania ↔ depressão',sx:['Mania: humor eufórico, grandiosidade, logorreia, diminuição do sono, gastos excessivos','Depressão: tristeza, anedonia, fadiga, ideação suicida'],pontos:[{q:'Mania ≥ quantos dias?',a:'≥7 dias; hipomania ≥4 dias'},{q:'Psicose ocorre em qual?',a:'Mania (não na hipomania)'},{q:'TAB I vs II?',a:'Tipo I: mania franca. Tipo II: hipomania + depressão, nunca mania'},{q:'Antidepressivo isolado?',a:'Não — risco de virada maníaca'},{q:'Estabilizador 1ª linha?',a:'Carbonato de lítio'},{q:'Exames antes do lítio?',a:'Função renal + TSH'}],alerta:'Sempre avaliar risco suicida e diferenciar mania de hipomania'},
  {id:'dep',cat:'humor',title:'Depressão (Transtorno Depressivo Maior)',sub:'≥5 sintomas por ≥15 dias — humor deprimido ou anedonia obrigatório',sx:['Humor deprimido','Anedonia','Fadiga, alteração sono/apetite','Culpa excessiva, desatenção','Ideação suicida'],pontos:[{q:'Sintomas cardinais?',a:'Humor deprimido e anedonia'},{q:'Critério mínimo?',a:'≥5 sintomas por ≥15 dias'},{q:'O que excluir antes do antidepressivo?',a:'TAB + causas orgânicas (TSH, hemograma)'},{q:'Primeira linha?', a:'ISRS + mev'},{q:'Melhor para insônia?',a:'Trazodona ou mirtazapina'},{q:'Melhor para dor crônica?',a:'Duloxetina (IRSN)'},{q:'ECT quando?',a:'Suicídio alto risco, psicose, catatonia, resistência'},{q:'Depressão leve: ATD obrigatório?',a:'Não — psicoterapia é suficiente'}],alerta:'Avaliar risco suicida em toda consulta'},
  {id:'distimia',cat:'humor',title:'Distimia',sub:'Humor deprimido crônico leve por ≥2 anos',sx:['Humor deprimido persistente','Baixa autoestima, fadiga','Alteração sono e apetite','Dificuldade de concentração'],pontos:[{q:'Tempo mínimo?',a:'≥2 anos em adultos; ≥1 ano em crianças'},{q:'Pode evoluir para depressão maior?',a:'Sim — chama-se depressão dupla'},{q:'Tratamento?',a:'Psicoterapia + ISRS'}],alerta:'Diagnóstico diferencial com depressão maior: gravidade e tempo de evolução'},
  {id:'dpp',cat:'humor',title:'Depressão pós-parto e psicótica',sub:'Puerpério — diferente do blues puerperal (<15 dias)',sx:['Tristeza, choro fácil, cansaço intenso','Culpa, dificuldade de vínculo com bebê','Em casos graves: pensamentos de causar mal ao bebê'],pontos:[{q:'Blues puerperal dura?',a:'<15 dias — mais leve, autolimitado'},{q:'Psicose puerperal é urgência?',a:'Sim — delírios, alucinações, emergência psiquiátrica'},{q:'ATD mais seguro na lactação?',a:'Sertralina'},{q:'Quando internar?',a:'Psicose, risco suicida, risco para bebê'}],alerta:'Avaliar sempre risco para a mãe E para o bebê'},
  {id:'suicidio',cat:'humor',title:'Síndrome da crise suicida',sub:'Avaliar sempre: plano, método, tentativa prévia',sx:['Ideação suicida, desesperança','Mensagens de despedida, doação de bens','Pesquisa de métodos, isolamento progressivo'],pontos:[{q:'Principal fator de risco?',a:'Tentativa prévia'},{q:'Principal fator protetor?',a:'Rede de apoio/família'},{q:'Paciente pode ficar sozinho?',a:'Não'},{q:'Medicação com redução comprovada?',a:'Lítio (longo prazo)'},{q:'Conduta inicial?',a:'Garantir segurança + retirar objetos + acionar psiquiatria'}],alerta:'NUNCA minimizar fala suicida. Não julgar. Não deixar sozinho.'},
  {id:'tag',cat:'ansiedade',title:'TAG — Transtorno de Ansiedade Generalizada',sub:'Preocupação excessiva na maioria dos dias por ≥6 meses',sx:['Preocupação excessiva e persistente','Inquietação, irritabilidade, fadiga','Dificuldade de concentração, tensão muscular','Insônia'],pontos:[{q:'Tempo mínimo?',a:'6 meses'},{q:'Tratamento 1ª linha?',a:'TCC + ISRS'},{q:'Benzodiazepínico resolve TAG?',a:'Não — só sintomático, evitar uso crônico'}],alerta:'Excluir causas orgânicas: TSH, glicemia, ECG'},
  {id:'panico',cat:'ansiedade',title:'Transtorno do pânico e agorafobia',sub:'Crises recorrentes + ansiedade antecipatória',sx:['Taquicardia, falta de ar, dor torácica','Sudorese, tremores, despersonalização','Medo de morrer ou enlouquecer'],pontos:[{q:'Duração do ataque?',a:'15–20 minutos'},{q:'Principal diferencial?',a:'IAM — sempre excluir'},{q:'Medicação na crise?',a:'Benzodiazepínico (lorazepam, diazepam)'},{q:'Tratamento manutenção?',a:'TCC + ISRS'},{q:'Agorafobia: medo principal?',a:'Não conseguir escapar ou receber ajuda'}],alerta:'Ataque de pânico é sintoma, não diagnóstico isolado'},
  {id:'fobias',cat:'ansiedade',title:'Fobias específicas e fobia social',sub:'Medo intenso + evitação + ≥6 meses + prejuízo funcional',sx:['Fobia específica: medo desproporcional de objeto/situação','Fobia social: medo de avaliação negativa, situações sociais','Ansiedade imediata ao contato com estímulo'],pontos:[{q:'Tempo mínimo?',a:'6 meses'},{q:'Tratamento principal?',a:'TCC + exposição gradual'},{q:'Fobia social 1ª linha?',a:'TCC + ISRS'},{q:'Timidez é doença?',a:'Não'},{q:'Medicação cura fobia?',a:'Não'}],alerta:'Fobia social: avaliar sempre uso de álcool/drogas como automedicação'},
  {id:'tept',cat:'ansiedade',title:'TEPT — Transtorno de Estresse Pós-Traumático',sub:'4 grupos de sintomas após trauma grave',sx:['Flashbacks e pesadelos (intrusão)','Evitação de gatilhos do trauma','Humor negativo, culpa, anedonia','Hipervigilância, irritabilidade, insônia'],pontos:[{q:'Grupos de sintomas?',a:'4: intrusão, evitação, cognição/humor, hiperexcitabilidade'},{q:'Sintoma clássico?',a:'Flashback'},{q:'Tratamento principal?',a:'Psicoterapia/TCC'},{q:'BZD é 1ª linha?',a:'Não — prejudica processamento do trauma'},{q:'ISRS usados?',a:'Sertralina e paroxetina'}],alerta:'Diagnóstico exige: exposição ao trauma + todos os 4 grupos'},
  {id:'esquizo',cat:'psicotico',title:'Esquizofrenia',sub:'≥2 sintomas por ≥6 meses + prejuízo funcional obrigatório',sx:['Positivos: delírios, alucinações, discurso desorganizado','Negativos: embotamento afetivo, hipobulia, anedonia, isolamento'],pontos:[{q:'Tempo mínimo?',a:'6 meses (≥1 mês de fase ativa)'},{q:'Critério obrigatório?',a:'Prejuízo funcional'},{q:'Tratamento da refratária?',a:'Clozapina (após falha de 2 antipsicóticos)'},{q:'Principal risco da clozapina?',a:'Agranulocitose — hemograma semanal'},{q:'Extrapiramidais mais em quê?',a:'Antipsicóticos típicos (haloperidol)'}],alerta:'Excluir causas orgânicas: TSH, toxicologia, neuroimagem, sorologias'},
  {id:'outros_psi',cat:'psicotico',title:'Esquizoafetivo, esquizofreniforme e psicótico breve',sub:'Diferenciação pelo tempo e relação com humor',sx:['Esquizoafetivo: psicose + episódio de humor (depressão ou mania)','Esquizofreniforme: mesmo quadro da esquizofrenia, duração 1–6 meses','Psicótico breve: 1 dia a 1 mês + remissão completa'],pontos:[{q:'Esquizoafetivo vs TAB psicótico?',a:'Psicose por ≥2 semanas SEM episódio de humor'},{q:'Esquizofreniforme dura?',a:'1–6 meses (frequentemente evolui para esquizofrenia)'},{q:'Psicótico breve: diferença?',a:'Retorna ao funcionamento prévio após remissão'},{q:'Transtorno delirante: tempo mínimo?',a:'≥1 mês — sem grande prejuízo funcional'}],alerta:'Sempre excluir substâncias e causas orgânicas em qualquer quadro psicótico'},
  {id:'toc',cat:'toc',title:'TOC e transtornos relacionados',sub:'Obsessões e/ou compulsões — sintomas egodistônicos',sx:['Pensamentos intrusivos indesejados (obsessões)','Rituais repetitivos para aliviar ansiedade (compulsões)','Subtipos: contaminação, dúvida, simetria, pensamentos inaceitáveis'],pontos:[{q:'TOC é transtorno de ansiedade no DSM-5?',a:'Não — categoria própria'},{q:'Sintomas são egodistônicos?',a:'Sim — paciente reconhece como irracional'},{q:'Critério diagnóstico?',a:'Obsessão e/ou compulsão >1h/dia com prejuízo'},{q:'Tratamento 1ª linha?',a:'TCC + ISRS em doses altas'},{q:'Tricíclico do TOC?',a:'Clomipramina'}],alerta:'Compulsão serve para aliviar ansiedade temporariamente, não porque o paciente quer'},
  {id:'toc_rel',cat:'toc',title:'TDC, acumulação, tricotilomania, escoriação',sub:'Transtornos relacionados ao TOC — tratamento: TCC + ISRS',sx:['TDC: preocupação excessiva com defeito imaginário/mínimo','Acumulação: dificuldade de descartar objetos','Tricotilomania: arrancar cabelos/pelos compulsivamente','Escoriação: manipular pele repetidamente até causar lesão'],pontos:[{q:'TDC: defeito costuma ser?',a:'Imaginário ou mínimo'},{q:'Tricotilomania: pode ser inconsciente?',a:'Sim'},{q:'Acumulação pode ser digital?',a:'Sim (arquivos, fotos)'},{q:'Tratamento de todos?',a:'TCC + ISRS'}],alerta:'TDC: evitar reforçar busca por procedimentos estéticos'},
  {id:'tdah',cat:'infanto',title:'TDAH',sub:'Tríade: desatenção + hiperatividade + impulsividade por >6 meses',sx:['Distrai-se facilmente, não termina tarefas','Agitação motora, levanta da cadeira','Interrompe os outros, responde antes de terminar a pergunta','Início antes dos 12 anos'],pontos:[{q:'Subtipo mais comum?',a:'Misto (55%)'},{q:'Escala mais cobrada?',a:'SNAP-IV'},{q:'Medicação 1ª linha?',a:'Metilfenidato (psicoestimulante)'},{q:'Pré-escolar leve?',a:'Preferir não farmacológico'},{q:'Efeito colateral clássico?',a:'Perda de apetite e insônia'}],alerta:'Diagnóstico clínico. Sintomas em mais de um ambiente.'},
  {id:'tea',cat:'infanto',title:'TEA — Transtorno do Espectro Autista',sub:'Déficits de comunicação social + padrões restritos/repetitivos',sx:['Pouco contato visual, não responde pelo nome','Atraso ou regressão da fala, ecolalia','Estereotipias (flapping), andar nas pontas dos pés','Apego excessivo à rotina, hiper/hipossensibilidade'],pontos:[{q:'Escala e idade?',a:'M-CHAT — 18 a 24 meses'},{q:'Diagnóstico?',a:'Clínico'},{q:'Tratamento?',a:'Multidisciplinar (fono, TO, psico, pedagogia)'},{q:'Antipsicótico para irritabilidade?',a:'Risperidona'},{q:'ISRS melhoram TEA?',a:'Não têm boa eficácia'}],alerta:'Sinal precoce: não aponta, não olha ao ser chamado, regressão da fala'},
  {id:'tourette',cat:'infanto',title:'Tiques e síndrome de Tourette',sub:'Tourette = tique motor + vocal por ≥12 meses',sx:['Tiques motores: piscar, caretas, movimentos faciais','Tiques vocais: pigarros, sons, palavras involuntárias','Início antes dos 18 anos'],pontos:[{q:'Tourette precisa de?',a:'Tique motor + vocal'},{q:'Tempo mínimo?',a:'12 meses'},{q:'Tratamento 1ª linha?',a:'Psicoeducação + TCC'},{q:'Antipsicóticos usados?',a:'Risperidona, aripiprazol'},{q:'Estresse piora?',a:'Sim'},{q:'Comorbidade comum?',a:'TDAH e TOC'}],alerta:'Diagnóstico clínico. Estresse e fadiga agravam os tiques.'},
  {id:'somatico',cat:'somatico',title:'Transtornos somáticos e conversivo',sub:'Paciente sofre de verdade — sintomas não são inventados',sx:['TSS: múltiplos sintomas físicos, exames normais, alta procura por médicos','Hipocondria (TAD): medo de ter doença grave, sintomas ausentes/leves','Conversivo: sintomas neurológicos funcionais incompatíveis com doença neurológica'],pontos:[{q:'Paciente inventa os sintomas?',a:'Não — sofre de verdade'},{q:'Tempo mínimo TSS?',a:'6 meses'},{q:'La belle indifférence?',a:'Conversivo — pouca preocupação com sintomas graves'},{q:'Hipocondria: sintomas físicos importantes?',a:'Não'},{q:'Tratamento principal?',a:'Psicoterapia/TCC'},{q:'Factício: objetivo?',a:'Assumir papel de doente (sem ganho externo)'}],alerta:'Validar sofrimento. Evitar iatrogenia. Não confrontar diretamente.'},
  {id:'tus',cat:'substancia',title:'TUS — Transtorno por uso de substâncias',sub:'≥2 critérios dos grupos A-D',sx:['Controle: uso maior que planejado, craving, tentativas frustradas de parar','Prejuízo social: falta no trabalho, abandono de atividades','Farmacológico: tolerância e abstinência'],pontos:[{q:'Quantos critérios?',a:'≥2 dos grupos A-D'},{q:'Teste para alcoolismo?',a:'CAGE'},{q:'Teste para nicotina?',a:'Fagerström'},{q:'Abstinência alcoólica: início?',a:'6h após interrupção — tremores, ansiedade, sudorese'},{q:'Delirium tremens: tratamento?',a:'Benzodiazepínico (diazepam/lorazepam)'},{q:'Glicose antes da tiamina?',a:'NUNCA — risco de Wernicke'},{q:'Dependência alcoólica: medicação?',a:'Naltrexona, topiramato'},{q:'Nicotina 1ª linha?',a:'TRN (adesivo, goma) + bupropiona/vareniclina'}],alerta:'NUNCA dar glicose antes da tiamina em alcoolistas!'},
  {id:'itu_ped',cat:'ped',title:'ITU pediátrica',sub:'E. coli mais comum — RN com ITU = tratar como sepse',sx:['Lactente: febre sem foco, irritabilidade, recusa alimentar','Criança maior: disúria, polaciúria, urina turva','Pielonefrite: febre alta, dor lombar, vômitos'],pontos:[{q:'Padrão-ouro?',a:'Urocultura'},{q:'Nitrito negativo exclui?',a:'Não'},{q:'Imagem inicial?',a:'USG renal (indicar <2 anos + ITU febril)'},{q:'Bacteriúria assintomática?',a:'NÃO tratar'},{q:'Quando internar?',a:'<3 meses, sepse, vômitos, toxemia'},{q:'Profilaxia ATB?',a:'Cefalexina'}],alerta:'Punção suprapúbica = qualquer crescimento bacteriano = positivo'},
  {id:'gnda',cat:'ped',title:'GNDA pós-estreptocócica',sub:'Síndrome nefrítica: edema + hematúria + HAS',sx:['Edema periorbitário matinal','Hematúria macroscópica (urina coca-cola)','Oligúria e hipertensão arterial'],pontos:[{q:'Agente?',a:'Streptococcus beta-hemolítico grupo A'},{q:'Complemento?',a:'C3 baixo, C4 normal'},{q:'Achado patognomônico?',a:'Cilindro hemático no EAS'},{q:'Diurético?',a:'Furosemida'},{q:'ATB?',a:'Penicilina benzatina'},{q:'Prognóstico?',a:'Excelente — 95% de recuperação'}],alerta:'Período de latência: 1–3 sem (faringite) ou 3–6 sem (piodermite)'},
  {id:'cvf',cat:'ped',title:'Convulsão febril',sub:'6 meses a 5 anos — sempre excluir meningite',sx:['Convulsão com febre ≥38°C, sem infecção do SNC','Simples: <15 min, sem recorrência em 24h, generalizada','Complexa: focal, >15 min, recorrente em 24h'],pontos:[{q:'Principal diferencial?',a:'Meningite'},{q:'Punção lombar é obrigatória?',a:'Não — indicar <6 meses, suspeita meningite'},{q:'BZD usado?',a:'Diazepam ou midazolam'},{q:'EEG na crise simples?',a:'Não'},{q:'Maioria evolui epilepsia?',a:'Não'}],alerta:'Crise focal = complexa. Crise simples tem prognóstico excelente.'},

let activecat='todos';

function renderFilters(){
  document.getElementById('filters').innerHTML=cats.map(c=>`<button class="fb${activecat===c.id?' on':''}" onclick="setcat('${c.id}')">${c.label}</button>`).join('');
}
function setcat(id){activecat=id;render();}

function render(){
  renderFilters();
  const q=document.getElementById('search').value.toLowerCase();
  const list=data.filter(d=>{
    const mc=activecat==='todos'||d.cat===activecat;
    const mq=!q||d.title.toLowerCase().includes(q)||d.sub.toLowerCase().includes(q)||d.cat.includes(q);
    return mc&&mq;
  });
  document.getElementById('count').textContent=list.length+' temas';
  const el=document.getElementById('cards');
  if(!list.length){el.innerHTML='<div class="empty">Nenhum tema encontrado.</div>';return;}
  el.innerHTML=list.map(d=>cardHTML(d)).join('');
  el.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('open')));
}

function catLabel(id){return cats.find(c=>c.id===id)?.label||id;}

function cardHTML(d){
  const sxpills=d.sx.length?`<div class="sl">Apresentação</div><div class="pills">${d.sx.map(s=>`<span class="pill">${s}</span>`).join('')}</div>`:'';
  const qa=d.pontos.map(p=>`<div class="qi"><div class="qq">${p.q}</div><div class="qa-a">${p.a}</div></div>`).join('');
  const bstyle=bc[d.cat]||'';
  return `<div class="card">
    <div class="ch"><span class="badge" style="${bstyle}">${catLabel(d.cat)}</span><i class="ti ti-chevron-down ico" aria-hidden="true"></i></div>
    <div class="ctitle">${d.title}</div>
    <div class="csub">${d.sub}</div>
    <div class="body">
      ${sxpills}
      <div class="sl">Pontos-chave OSCE</div>
      <div class="qa">${qa}</div>
      <div class="alert"><i class="ti ti-alert-triangle" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>${d.alerta}</div>
      <button class="askb" onclick="event.stopPropagation();sendPrompt('Me explica mais sobre ${d.title.replace(/'/g,"\\'")} para o OSCE: diagnóstico diferencial, tratamento e o que mais cai')">-↗</button>
    </div>
  </div>`;
}

render();
