<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD → JS · OSCE Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3244;
      --accent: #4f9cf9;
      --text: #e2e8f0;
      --muted: #7c8498;
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
      --font-mono: "Fira Code", "Cascadia Code", "Consolas", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 0.95rem; font-weight: 600; }

    .badge {
      font-size: 0.68rem;
      background: #1e3a5f;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 600;
    }
    .badge.warn {
      background: #3a2e1e;
      color: var(--warn);
      border-color: var(--warn);
    }
    .badge.dim {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .api-bar {
      display: none;
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .api-bar.visible { display: flex; }
    .api-bar label { font-size: 0.73rem; color: var(--muted); white-space: nowrap; }
    .api-bar input {
      flex: 1;
      max-width: 400px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 5px 10px;
      font-size: 0.76rem;
      font-family: var(--font-mono);
      outline: none;
    }
    .api-bar input:focus { border-color: var(--accent); }
    .api-bar .hint {
      font-size: 0.68rem;
      color: var(--muted);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    .pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
    }
    .pane:last-child { border-right: none; }

    .pane-header {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .pane-header h2 {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .pane-header .actions { display: flex; gap: 5px; align-items: center; }

    textarea, pre#output {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.65;
      overflow: auto;
      min-height: 0;
    }
    textarea { resize: none; }
    pre#output { white-space: pre; }

    .pane.drag-over textarea {
      outline: 2px dashed var(--accent);
      outline-offset: -3px;
    }

    .bottom-bar {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #status {
      flex: 1;
      font-size: 0.72rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #status.ok     { color: var(--success); }
    #status.err    { color: var(--error); }
    #status.loading { color: var(--accent); }

    button, .btn-label {
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 5px 12px;
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }
    button:hover, .btn-label:hover { opacity: 0.8; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy    { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; }
      .pane { border-right: none; border-bottom: 1px solid var(--border); }
      .api-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <h1>OSCE · MD → JS Converter</h1>
  <span class="badge dim" id="modeBadge">detectando…</span>
</header>

<div class="api-bar" id="apiBar">
  <label for="apiKey">Chave API Anthropic:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-…" autocomplete="off" spellcheck="false" />
  <span class="hint">Salva nesta aba (sessionStorage) — não enviada a nenhum servidor externo</span>
</div>

<main>
  <!-- ENTRADA -->
  <div class="pane" id="inputPane">
    <div class="pane-header">
      <h2>Markdown · Entrada</h2>
      <div class="actions">
        <label class="btn-ghost btn-label" for="fileInput">Abrir .md</label>
        <input type="file" id="fileInput" accept=".md,.txt" style="display:none" />
        <button class="btn-ghost" id="btnClear">Limpar</button>
        <button class="btn-ghost" id="btnPaste">Colar</button>
      </div>
    </div>
    <textarea id="input"
      placeholder="Cole aqui o markdown do caso OSCE (BLOCO 1–5) ou arraste um arquivo .md…"
      spellcheck="false"></textarea>
    <div class="bottom-bar">
      <div class="spinner" id="spinner"></div>
      <span id="status">Aguardando modo de conexão…</span>
      <button class="btn-primary" id="btnConvert" disabled>Converter →</button>
    </div>
  </div>

  <!-- SAÍDA -->
  <div class="pane">
    <div class="pane-header">
      <h2>JavaScript · Saída</h2>
      <div class="actions">
        <button class="btn-copy" id="btnCopy">Copiar</button>
        <button class="btn-ghost" id="btnDownload">Baixar .js</button>
      </div>
    </div>
    <pre id="output"></pre>
    <div class="bottom-bar" style="justify-content:flex-end;">
      <span id="charCount" style="font-size:0.71rem;color:var(--muted);"></span>
    </div>
  </div>
</main>

<script>
// ── Schema e System Prompt ────────────────────────────────────────────────────
const SCHEMA = `{
  id: <number>,
  title: "<card title>",
  sub: "<setting subtitle>",
  tema: "<specialty slug>",
  topic: "<topic slug>",
  level: "simples" | "moderado" | "difícil",
  cardAccent: "<hex color>",

  instA: {
    scenario: "<setting description>",
    patient: "<name, age, sex, ...>",
    complaint: "<chief complaint>",
    tasks: ["<task 1>", ...]
  },

  instB: {
    vitals: { PA: "<value or null>", FC: "<value or null>", FR: "<value or null>", Tax: "<value or null>", Peso: "<value or null>", Altura: "<value or null>", IMC: "<value or null>" },
    physicalGeneral: "<general exam text>",
    physicalSeg: ["<SYSTEM: finding>", ...],
    labs: [
      { test: "<exam name>", val: "<result>", ref: "<reference range>", alt: true | false },
      ...
    ],
    image: null,
    note: "<examiner note>",
    patientProfile: "<name, age, sex, context>",
    script: [
      { trigger: "<trigger phrase>", speech: "<patient speech>" },
      ...
    ],
    hiddenInfo: ["<hidden info 1>", ...],
    actorBehavior: "<actor directions>"
  },

  instC: {
    diagnosis: "<final diagnosis>",
    differentials: ["<differential 1>", ...],
    context: "<case synthesis>",
    justify: "<diagnostic justification>",
    expectedAnamnesis: ["<item 1>", ...],
    expectedPhysical: ["<item 1>", ...],
    expectedExams: [
      { exam: "<name>", justify: "<why>", expected: "<expected result>" },
      ...
    ],
    expectedConduct: ["<item 1>", ...],
    expectedCommunication: ["<item 1>", ...],
    criticalErrors: ["<error 1>", ...]
  },

  instD: {
    title: "<checklist title>",
    sections: [
      {
        h: "<section heading>",
        items: [
          { item: "<criterion text>", score: <number>, ref: "<reference>" },
          ...
        ]
      },
      ...
    ]
  }
}`;

const SYSTEM_PROMPT = `You are a medical education data engineer. Your job is to convert markdown OSCE case files into a strict JavaScript object literal.

The object MUST match this schema exactly — do NOT add, rename, or remove any property:
${SCHEMA}

STRICT PROPERTY RULES:
- Top-level properties allowed ONLY: id, title, sub, tema, topic, level, cardAccent — nothing else.
- instA properties: scenario, patient, complaint, tasks — nothing else.
- instB properties: vitals, physicalGeneral, physicalSeg, labs, image, note, patientProfile, script, hiddenInfo, actorBehavior — nothing else.
- instC properties: diagnosis, differentials, context, justify, expectedAnamnesis, expectedPhysical, expectedExams, expectedConduct, expectedCommunication, criticalErrors — nothing else.
- instD properties: title, sections (array of {h, items: [{item, score, ref}]}) — nothing else.
- Extra markdown fields like Time, Type, Comp, tempo, tipo, competências — DISCARD silently.

FIELD MAPPING:
- BLOCO 1 → top-level: id (number), title, sub, tema, topic, level, cardAccent
- BLOCO 2 → instA: scenario, patient, complaint, tasks[]
- BLOCO 3 → instB (all sub-fields)
- BLOCO 4 → instC (all sub-fields)
- BLOCO 5 → instD: title, sections[]

OUTPUT RULES:
- Return ONLY the raw JavaScript object literal — no imports, exports, const declarations, or markdown fences.
- All string values use double quotes. No single quotes anywhere.
- Boolean alt field in labs: true or false (never "sim"/"não").
- score in instD items must be a JS number (0.5, 1.0), never a string.
- Comma decimal separators (0,5) → dot (0.5).
- Strip ❌ ✅ → and all emoji prefixes from text values.
- vitals: use string value if present, or null (bare null, not the string "null") if missing/dashes.
- Missing fields: null for scalars, [] for arrays, "" for strings.
- No comments inside the object.
- Preserve all Portuguese text exactly — accents, special characters, punctuation.`;

// ── Estado ────────────────────────────────────────────────────────────────────
let MODE = "unknown";

const modeBadge  = document.getElementById("modeBadge");
const apiBar     = document.getElementById("apiBar");
const apiKeyEl   = document.getElementById("apiKey");
const btnConvert = document.getElementById("btnConvert");
const inputEl    = document.getElementById("input");
const outputEl   = document.getElementById("output");
const statusEl   = document.getElementById("status");
const spinner    = document.getElementById("spinner");
const charCountEl = document.getElementById("charCount");

// ── Detecção de modo ──────────────────────────────────────────────────────────
function fetchWithTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(id));
}

async function detectMode() {
  try {
    const r = await fetchWithTimeout("/ping", {}, 2000);
    if (r.ok) return "server";
  } catch (_) {}
  return "direct";
}

function applyMode(mode) {
  MODE = mode;
  if (mode === "server") {
    modeBadge.textContent = "Servidor local";
    modeBadge.className = "badge";
    apiBar.classList.remove("visible");
    setStatus("Pronto. Cole o markdown e clique em Converter.", "");
  } else {
    modeBadge.textContent = "Direto via API";
    modeBadge.className = "badge warn";
    apiBar.classList.add("visible");
    const saved = sessionStorage.getItem("osce_api_key");
    if (saved) apiKeyEl.value = saved;
    setStatus("Cole a chave API acima e depois o markdown para converter.", "");
  }
  btnConvert.disabled = false;
}

apiKeyEl.addEventListener("input", () => {
  sessionStorage.setItem("osce_api_key", apiKeyEl.value.trim());
});

// ── Conversão ─────────────────────────────────────────────────────────────────
async function convertViaServer(md) {
  const res = await fetch("/convert", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ markdown: md })
  });
  const text = await res.text();
  if (text.startsWith("ERRO:")) throw new Error(text.slice(5).trim());
  return text;
}

async function convertDirect(md) {
  const key = apiKeyEl.value.trim();
  if (!key) throw new Error("Cole sua chave Anthropic no campo acima antes de converter.");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 8192,
      system: SYSTEM_PROMPT,
      messages: [{
        role: "user",
        content: `Convert this markdown OSCE case to the JavaScript object literal:\n\n${md}`
      }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erro HTTP ${res.status}`);
  }
  const data = await res.json();
  let raw = data.content[0].text.trim();
  raw = raw.replace(/^```(?:javascript|js)?\n?/, "").replace(/\n?```$/, "").trim();
  return raw;
}

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type || "";
}

function setLoading(on) {
  spinner.classList.toggle("active", on);
  btnConvert.disabled = on;
}

btnConvert.addEventListener("click", async () => {
  const md = inputEl.value.trim();
  if (!md) { setStatus("⚠ Cole o markdown antes de converter.", "err"); return; }
  setLoading(true);
  setStatus(MODE === "server" ? "Enviando para Claude via servidor local…" : "Chamando Claude API…", "loading");
  outputEl.textContent = "";
  charCountEl.textContent = "";
  try {
    const result = MODE === "server" ? await convertViaServer(md) : await convertDirect(md);
    outputEl.textContent = result;
    charCountEl.textContent = `${result.length.toLocaleString("pt-BR")} chars`;
    setStatus("✓ Convertido com sucesso.", "ok");
  } catch (e) {
    setStatus(`✗ ${e.message}`, "err");
  } finally {
    setLoading(false);
  }
});

// ── Abrir arquivo .md ─────────────────────────────────────────────────────────
document.getElementById("fileInput").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => { inputEl.value = ev.target.result; };
  reader.readAsText(f, "UTF-8");
  e.target.value = "";
});

// ── Drag & drop ───────────────────────────────────────────────────────────────
const inputPane = document.getElementById("inputPane");
inputPane.addEventListener("dragover", e => {
  e.preventDefault();
  inputPane.classList.add("drag-over");
});
inputPane.addEventListener("dragleave", () => inputPane.classList.remove("drag-over"));
inputPane.addEventListener("drop", e => {
  e.preventDefault();
  inputPane.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => { inputEl.value = ev.target.result; };
  reader.readAsText(f, "UTF-8");
});

// ── Botões auxiliares ─────────────────────────────────────────────────────────
document.getElementById("btnCopy").addEventListener("click", async () => {
  const text = outputEl.textContent;
  if (!text) return;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById("btnCopy");
  btn.textContent = "Copiado!";
  setTimeout(() => { btn.textContent = "Copiar"; }, 1500);
});

document.getElementById("btnDownload").addEventListener("click", () => {
  const text = outputEl.textContent;
  if (!text) return;
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([text], { type: "text/javascript" })),
    download: "caso_convertido.js"
  });
  a.click();
});

document.getElementById("btnClear").addEventListener("click", () => {
  inputEl.value = "";
  outputEl.textContent = "";
  charCountEl.textContent = "";
  setStatus("Pronto.", "");
});

document.getElementById("btnPaste").addEventListener("click", async () => {
  try { inputEl.value = await navigator.clipboard.readText(); }
  catch { inputEl.focus(); }
});

// ── Init ──────────────────────────────────────────────────────────────────────
detectMode().then(applyMode);
</script>
</body>
</html>
